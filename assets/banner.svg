<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1440 360" role="img" aria-label="Fortuna — Brand Health Tracker">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="100%" stop-color="#f3faf6"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#0FA958"/>
      <stop offset="100%" stop-color="#10b981"/>
    </linearGradient>
    <linearGradient id="bar" x1="0" y1="1" x2="0" y2="0">
      <stop offset="0%" stop-color="#0FA958" stop-opacity="0.15"/>
      <stop offset="100%" stop-color="#0FA958" stop-opacity="0.85"/>
    </linearGradient>
    <radialGradient id="dot" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#0FA958" stop-opacity="0.9"/>
      <stop offset="100%" stop-color="#0FA958" stop-opacity="0"/>
    </radialGradient>
    <pattern id="grid" width="36" height="36" patternUnits="userSpaceOnUse">
      <path d="M 36 0 L 0 0 0 36" fill="none" stroke="#0FA958" stroke-opacity="0.06" stroke-width="1"/>
    </pattern>
  </defs>

  <rect width="1440" height="360" fill="url(#bg)"/>
  <rect width="1440" height="360" fill="url(#grid)"/>

  <!-- accent ribbon -->
  <rect x="0" y="0" width="6" height="360" fill="url(#accent)"/>

  <!-- DJ scatter / heatmap motif (right side) -->
  <g transform="translate(940, 70)" opacity="0.92">
    <!-- axes -->
    <line x1="0" y1="220" x2="420" y2="220" stroke="#1A1A1A" stroke-opacity="0.35" stroke-width="1.5"/>
    <line x1="0" y1="0" x2="0" y2="220" stroke="#1A1A1A" stroke-opacity="0.35" stroke-width="1.5"/>
    <!-- DJ expected curve -->
    <path d="M 0 200 Q 110 110, 220 70 T 420 30" fill="none" stroke="#0FA958" stroke-width="2.5" stroke-dasharray="6 5"/>
    <!-- brand dots: actual vs expected -->
    <circle cx="60"  cy="180" r="9"  fill="#0FA958"/>
    <circle cx="120" cy="140" r="11" fill="#0FA958"/>
    <circle cx="180" cy="118" r="14" fill="#0FA958"/>
    <circle cx="250" cy="82"  r="10" fill="#1A1A1A"/>
    <circle cx="320" cy="58"  r="13" fill="#0FA958"/>
    <circle cx="380" cy="48"  r="9"  fill="#1A1A1A"/>
    <!-- DEFEND / BUILD chips -->
    <g transform="translate(0, 245)">
      <rect width="92" height="22" rx="11" fill="#0FA958" fill-opacity="0.12" stroke="#0FA958" stroke-opacity="0.5"/>
      <text x="46" y="15" font-family="ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto" font-size="11" font-weight="600" fill="#0a7a3f" text-anchor="middle">DEFEND ≥+5pp</text>
    </g>
    <g transform="translate(104, 245)">
      <rect width="98" height="22" rx="11" fill="#1A1A1A" fill-opacity="0.06" stroke="#1A1A1A" stroke-opacity="0.35"/>
      <text x="49" y="15" font-family="ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto" font-size="11" font-weight="600" fill="#1A1A1A" text-anchor="middle">MAINTAIN ±4pp</text>
    </g>
    <g transform="translate(214, 245)">
      <rect width="88" height="22" rx="11" fill="#dc2626" fill-opacity="0.10" stroke="#dc2626" stroke-opacity="0.45"/>
      <text x="44" y="15" font-family="ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto" font-size="11" font-weight="600" fill="#991b1b" text-anchor="middle">BUILD ≤−5pp</text>
    </g>
  </g>

  <!-- bar chart motif (middle) -->
  <g transform="translate(700, 210)" opacity="0.9">
    <rect x="0"   y="-30"  width="22" height="80" rx="3" fill="url(#bar)"/>
    <rect x="32"  y="-65"  width="22" height="115" rx="3" fill="url(#bar)"/>
    <rect x="64"  y="-95"  width="22" height="145" rx="3" fill="url(#bar)"/>
    <rect x="96"  y="-50"  width="22" height="100" rx="3" fill="url(#bar)"/>
    <rect x="128" y="-115" width="22" height="165" rx="3" fill="url(#bar)"/>
    <rect x="160" y="-72"  width="22" height="122" rx="3" fill="url(#bar)"/>
    <line x1="-6" y1="50" x2="190" y2="50" stroke="#1A1A1A" stroke-opacity="0.35" stroke-width="1.5"/>
  </g>

  <!-- soft glow dot behind logomark -->
  <circle cx="92" cy="118" r="64" fill="url(#dot)"/>

  <!-- logomark: F monogram in neon-green -->
  <g transform="translate(56, 78)">
    <rect width="76" height="76" rx="18" fill="#0FA958"/>
    <path d="M 22 18 H 56 V 28 H 32 V 38 H 50 V 48 H 32 V 62 H 22 Z" fill="#ffffff"/>
  </g>

  <!-- title block -->
  <g font-family="ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto">
    <text x="160" y="118" font-size="56" font-weight="800" fill="#1A1A1A" letter-spacing="-1.2">Fortuna</text>
    <text x="160" y="158" font-size="22" font-weight="600" fill="#0a7a3f" letter-spacing="0.3">Brand Health Tracker · Mental &amp; Physical Availability</text>
    <text x="160" y="200" font-size="16" font-weight="500" fill="#1A1A1A" fill-opacity="0.78">Category Buyer Memory · Double Jeopardy normalization · CEP-first methodology</text>
    <text x="160" y="226" font-size="15" font-weight="500" fill="#1A1A1A" fill-opacity="0.6">Built on Ehrenberg-Bass · Better Brand Health methodology</text>
  </g>

  <!-- chip row -->
  <g transform="translate(160, 252)" font-family="ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto">
    <g>
      <rect width="124" height="28" rx="14" fill="#0FA958" fill-opacity="0.12" stroke="#0FA958" stroke-opacity="0.5"/>
      <text x="62" y="18" font-size="12" font-weight="700" fill="#0a7a3f" text-anchor="middle">7-Phase build · live</text>
    </g>
    <g transform="translate(134, 0)">
      <rect width="120" height="28" rx="14" fill="#1A1A1A" fill-opacity="0.06" stroke="#1A1A1A" stroke-opacity="0.35"/>
      <text x="60" y="18" font-size="12" font-weight="700" fill="#1A1A1A" text-anchor="middle">CBM-compliant</text>
    </g>
    <g transform="translate(264, 0)">
      <rect width="142" height="28" rx="14" fill="#0FA958" fill-opacity="0.12" stroke="#0FA958" stroke-opacity="0.5"/>
      <text x="71" y="18" font-size="12" font-weight="700" fill="#0a7a3f" text-anchor="middle">Frozen formula contracts</text>
    </g>
    <g transform="translate(416, 0)">
      <rect width="124" height="28" rx="14" fill="#1A1A1A" fill-opacity="0.06" stroke="#1A1A1A" stroke-opacity="0.35"/>
      <text x="62" y="18" font-size="12" font-weight="700" fill="#1A1A1A" text-anchor="middle">Next.js · tRPC · Prisma</text>
    </g>
  </g>

  <!-- footer rule -->
  <rect x="0" y="354" width="1440" height="6" fill="url(#accent)" opacity="0.85"/>
</svg>
